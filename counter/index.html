<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7c3aed">
  <title>The Silly Counter</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at 20% 20%, rgba(236,72,153,.55), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(59,130,246,.55), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(34,197,94,.38), transparent 32%),
        #111827;
    }
    main {
      width: min(92vw, 620px);
      padding: 42px 28px 34px;
      text-align: center;
      background: rgba(17,24,39,.74);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 32px;
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }
    .eyebrow { margin: 0 0 8px; letter-spacing: .16em; text-transform: uppercase; font-size: 12px; font-weight: 800; color: #c4b5fd; }
    h1 { margin: 0; font-size: clamp(34px, 8vw, 62px); line-height: .98; }
    .sub { margin: 15px auto 30px; max-width: 440px; color: #cbd5e1; font-size: 16px; line-height: 1.5; }
    #count {
      min-height: 1.15em;
      margin: 0 0 25px;
      font-variant-numeric: tabular-nums;
      font-size: clamp(88px, 24vw, 170px);
      font-weight: 950;
      line-height: .9;
      text-shadow: 0 7px 0 rgba(0,0,0,.18);
      transition: transform .12s ease;
    }
    #count.bump { transform: scale(1.08) rotate(-1deg); }
    button {
      width: min(100%, 390px);
      min-height: 76px;
      border: 0;
      border-radius: 22px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      box-shadow: 0 13px 0 #5b21b6, 0 24px 45px rgba(139,92,246,.35);
      font: inherit;
      font-size: 22px;
      font-weight: 900;
      transform: translateY(0);
      transition: transform .08s ease, box-shadow .08s ease, filter .15s ease;
      touch-action: manipulation;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(9px); box-shadow: 0 4px 0 #5b21b6, 0 10px 25px rgba(139,92,246,.25); }
    button:disabled { cursor: wait; filter: grayscale(.35); }
    #status { min-height: 1.4em; margin: 25px 0 0; color: #94a3b8; font-size: 13px; }
    .dot { display: inline-block; width: 8px; height: 8px; margin-right: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 13px #22c55e; }
    .confetti { position: fixed; width: 9px; height: 14px; top: -20px; border-radius: 3px; pointer-events: none; animation: fall 1.3s ease-in forwards; }
    @keyframes fall { to { transform: translate(var(--x), 110vh) rotate(720deg); opacity: .1; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">One counter. Everyone clicking.</p>
    <h1>The Silly Counter</h1>
    <p class="sub">Every person who opens this page sees and changes the same number. There is no purpose. Click responsibly.</p>
    <div id="count" aria-live="polite">…</div>
    <button id="button" type="button">Make the number bigger</button>
    <p id="status"><span class="dot"></span>Connecting to the shared counter</p>
  </main>

  <script>
    const API = 'https://api.counterapi.dev/v1/alex-silly-counter-7f3b2a91/clicks';
    const count = document.getElementById('count');
    const button = document.getElementById('button');
    const status = document.getElementById('status');
    let busy = false;

    function extractValue(data) {
      const candidates = [data?.value, data?.count, data?.data?.value, data?.data?.count, data?.data];
      const value = candidates.find(candidate => Number.isFinite(Number(candidate)));
      if (value === undefined) throw new Error('Counter returned an unexpected response');
      return Number(value);
    }

    function showValue(value) {
      count.textContent = value.toLocaleString();
      count.classList.remove('bump');
      void count.offsetWidth;
      count.classList.add('bump');
    }

    async function request(path = '') {
      const response = await fetch(API + path, { cache: 'no-store' });
      if (!response.ok) throw new Error('Counter request failed');
      return extractValue(await response.json());
    }

    async function readCount(quiet = false) {
      try {
        const value = await request('');
        if (count.textContent !== value.toLocaleString()) showValue(value);
        if (!quiet) status.innerHTML = '<span class="dot"></span>Connected to the shared counter';
      } catch (error) {
        if (!quiet) status.textContent = 'Connection problem — retrying automatically';
      }
    }

    function confetti() {
      const colors = ['#f472b6','#a78bfa','#60a5fa','#4ade80','#facc15','#fb7185'];
      for (let i = 0; i < 28; i++) {
        const piece = document.createElement('i');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.setProperty('--x', (Math.random() * 220 - 110) + 'px');
        piece.style.animationDelay = Math.random() * .15 + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 1600);
      }
    }

    button.addEventListener('click', async () => {
      if (busy) return;
      busy = true;
      button.disabled = true;
      try {
        const value = await request('/up');
        showValue(value);
        confetti();
        status.innerHTML = '<span class="dot"></span>You made it bigger';
      } catch (error) {
        status.textContent = 'That click failed. Try again.';
      } finally {
        busy = false;
        button.disabled = false;
      }
    });

    readCount();
    setInterval(() => readCount(true), 5000);
  </script>
</body>
</html>
