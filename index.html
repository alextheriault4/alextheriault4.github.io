<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>AT — GitHub Pages Test</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #172033;
      --muted: #667085;
      --border: rgba(23, 32, 51, 0.12);
      --accent: #3457d5;
      --accent-hover: #2847bb;
      --shadow: 0 24px 60px rgba(29, 45, 85, 0.14);
    }

    [data-theme="dark"] {
      --bg: #0d111b;
      --panel: rgba(24, 31, 46, 0.88);
      --text: #f2f4f7;
      --muted: #a4adbd;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #7c96ff;
      --accent-hover: #94a9ff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 34%),
        var(--bg);
      transition: background 180ms ease, color 180ms ease;
    }

    main {
      width: min(720px, 100%);
      padding: clamp(24px, 6vw, 48px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 42px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.045em;
    }

    .subtitle {
      max-width: 520px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
    }

    .theme-button {
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      padding: 0;
      font-size: 1.15rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    section {
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
    }

    h2 {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #count {
      margin: 14px 0;
      font-size: 4.2rem;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    #message {
      min-height: 58px;
      margin: 20px 0;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px;
      color: var(--text);
      background: transparent;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 38%, transparent); outline-offset: 2px; }

    .primary {
      color: white;
      border-color: var(--accent);
      background: var(--accent);
    }

    .primary:hover { background: var(--accent-hover); }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.84rem;
      text-align: center;
    }

    @media (max-width: 620px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; }
      main { border-radius: 22px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">Deployment test</p>
        <h1>Simple. Live. Interactive.</h1>
        <p class="subtitle">A self-contained GitHub Pages site with no external libraries, assets, or dependencies.</p>
      </div>
      <button class="theme-button" id="themeToggle" type="button" aria-label="Toggle light and dark theme" title="Toggle theme">◐</button>
    </header>

    <div class="grid">
      <section aria-labelledby="counter-title">
        <div>
          <h2 id="counter-title">Counter</h2>
          <div id="count" aria-live="polite">0</div>
        </div>
        <div class="actions">
          <button class="primary" id="increment" type="button">Increment</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </section>

      <section aria-labelledby="message-title">
        <div>
          <h2 id="message-title">Random message</h2>
          <p id="message" aria-live="polite">Press the button.</p>
        </div>
        <div class="actions">
          <button class="primary" id="randomMessage" type="button">Show message</button>
        </div>
      </section>
    </div>

    <footer>alextheriault4.github.io</footer>
  </main>

  <script>
    const root = document.documentElement;
    const countDisplay = document.getElementById('count');
    const messageDisplay = document.getElementById('message');
    const messages = [
      'Keep moving.',
      'One clear next step.',
      'Build, test, improve.',
      'Done beats theoretical.',
      'Make it concrete.',
      'Small progress compounds.'
    ];

    let count = 0;

    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');

    document.getElementById('themeToggle').addEventListener('click', () => {
      const nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = nextTheme;
      localStorage.setItem('theme', nextTheme);
    });

    document.getElementById('increment').addEventListener('click', () => {
      count += 1;
      countDisplay.textContent = count;
    });

    document.getElementById('reset').addEventListener('click', () => {
      count = 0;
      countDisplay.textContent = count;
    });

    document.getElementById('randomMessage').addEventListener('click', () => {
      let next = messages[Math.floor(Math.random() * messages.length)];
      if (messages.length > 1 && next === messageDisplay.textContent) {
        next = messages[(messages.indexOf(next) + 1) % messages.length];
      }
      messageDisplay.textContent = next;
    });
  </script>
</body>
</html>
